apiVersion: v1 
kind: ConfigMap 
metadata: 
 name: payment-config
 namesapce: roboshop
 labels: 
    project : roboshop
    component: payment 
    tire: backend 
data: 
  CART_HOST: "cart" 
  CART_PORT: "8080" 
  USER_HOST: "user" 
  USER_PORT: "8080" 
  AMQP_HOST: "rabbitmq" 
  AMQP_USER: "roboshop"
  AMQP_PASS: "roboshop123" 

---
apiVersion: apps/v1
kind: Deployment
metadata: 
  name: payment
  namespace: roboshop 
  labels: 
    project : roboshop
    component: shipping 
    tire: backend
spec: 
  replicas: 1
  selector: 
   matchLabels: 
    project : roboshop
    component: shipping 
    tire: backend
  template: 
   metadata: 
    labels:
     project : roboshop
     component: shipping 
     tire: backend
   spec: 
     containers: 
      - name: payment 
        image: taruntejamb/payment:1.0.0
        imagePullPolicy: Always
        resources:
         requests: 
          cpu: "150m"
          memory: "128Mi"
         limits: 
          cpu: "200m" 
          memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 15
          failureThreshold: 2
          periodSeconds: 10  
        envFrom: 
         - configMapRef: 
             name: payment-config        

---
apiVersion: v1 
kind: Service
metadata: 
  name : payment 
  namespace: roboshop
  labels:
    project : roboshop
    component: payment 
    tire: backend 
spec: 
  selector:
    project : roboshop
    component: payment 
    tire: backend 
  ports: 
  - protocol: TCP
    port: 8080
    targetPort: 8080
       