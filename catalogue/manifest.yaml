apiVersion: v1 
kind: configMap 
metadata:
  name: catalogue-config
  namespace: roboshop
  labels:
    project : roboshop
    component: catlogue 
    tire: backend
data:
  MONGO:"true"
  MONGO_URL:"mongodb://mongodb:27017/catalogue" 

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project : roboshop
    component: catlogue 
    tire: backend
spec:
  replicas: 1
  selector:
   matchLabels:
     project : roboshop
     component: catlogue 
     tire: backend
  template:
    metadata:
     labels:
       project : roboshop
       component: catlogue 
       tire: backend
    spec:
      containers:
      - name: catalogue
        image: taruntejamb/catalogue:1.0.0
        resources:
          requests:
            memory: "64Mi"
            cpu: "125m"
          limits:
            memory: "128Mi"
            cpu: "250m"
        livenessProbe:
            httpGet:
             path: /health
             port: 8080
            failureThreshold: 2
            periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 15
          failureThreshold: 2
          periodSeconds: 10
        envFrom: 
        - configMapRef:
            name: catalogue-config

---
apiVersion: v1 
kind: Service
metadata: 
  name: catalogue
  namespace: roboshop
  labels:
    project : roboshop
    component: catlogue 
    tire: backend 
spec:
 selector: 
    project : roboshop
    component: catlogue 
    tire: backend
 ports:
  - protocol: TCP 
    port: 8080
    targetPort: 8080