apiVersion: v1 
kind: configMap
metadata: 
  name: frontend-config
  namespace: roboshop
  labels:
    project : roboshop
    component: frontend 
    tire: frontend
data: 
 nginx.conf: |
       user nginx;
        worker_processes auto;
        error_log /var/log/nginx/error.log notice;
        pid /run/nginx.pid;

        include /usr/share/nginx/modules/*.conf;

        events {
            worker_connections 1024;
        }

        http {
            log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                              '$status $body_bytes_sent "$http_referer" '
                              '"$http_user_agent" "$http_x_forwarded_for"';

            access_log  /var/log/nginx/access.log  main;

            sendfile            on;
            tcp_nopush          on;
            keepalive_timeout   65;
            types_hash_max_size 4096;

            include             /etc/nginx/mime.types;
            default_type        application/octet-stream;

            include /etc/nginx/conf.d/*.conf;

            server {
                listen       80;
                listen       [::]:80;
                server_name  _;
                root         /usr/share/nginx/html;

                include /etc/nginx/default.d/*.conf;

                error_page 404 /404.html;
                location = /404.html {
                }

                error_page 500 502 503 504 /50x.html;
                location = /50x.html {
                }

                location /images/ {
                  expires 5s;
                  root   /usr/share/nginx/html;
                  try_files $uri /images/placeholder.jpg;
                }
                location /api/catalogue/ { proxy_pass http://catalogue:8080/; }
                location /api/user/ { proxy_pass http://user:8080/; }
                location /api/cart/ { proxy_pass http://cart:8080/; }
                location /api/shipping/ { proxy_pass http://shipping:8080/; }
                location /api/payment/ { proxy_pass http://payment:8080/; }

                location /health {
                  stub_status on;
                  access_log off;
                }

            }
        }   
        

---
apiVersion: apps/v1 
kind: Deployment
metadata:
 name: frontend
 namespace: roboshop
 labels: 
    project : roboshop
    component: frontend 
    tire: frontend
spec: 
  replicas: 1
  selector: 
   matchLabels:
    project : roboshop
    component: frontend 
    tire: frontend 
  template: 
   metadata:
    labels:
      project : roboshop
      component: frontend 
      tire: frontend  
   spec: 
    volumes:
     - name: nginx-config
       configMap:
         name: frontend-config
    containers:
      - name: frontend
        image: taruntejamb/frontend:1.0.0
        imagePullPolicy: always
        resources:
          requests: 
            cpu: "100m"
            memory: "128Mi" 
          limits: 
            cpu: "150m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 15
          failureThreshold: 2
          periodSeconds: 10 
        volumeMounts:
        - name: nginx-config
          # by default it mounts and thinks as directory, so that's why we are using subpath here
          mountPath: "/etc/nginx/nginx.conf"
          subPath: nginx.conf
          readOnly: true

---
apiVersion: v1 
kind: Service
metadata: 
  name: frontend
  namespace: roboshop
  labels:
      project : roboshop
      component: frontend 
      tire: frontend     
spec: 
  type: LoadBalancer
  selector:
    project : roboshop
    component: frontend 
    tire: frontend 
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
 
