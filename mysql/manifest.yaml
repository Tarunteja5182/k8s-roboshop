apiVersion: apps/v1
kind: Deployment
metadata:
 name: mysql
 namespace: roboshop
 labels: 
   project : roboshop
   component: mysql 
   tire: db
spec: 
 replicas: 1
 selector: 
  matchLabels:
   project : roboshop
   component: mysql 
   tire: db
 template: 
  metadata:
   labels: 
    project : roboshop
    component: mysql 
    tire: db 
  spec:
   containers:
    - name: mysql
      image: taruntejamb/mysql:1.0.0
    
---
apiVersion: v1 
kind: Service
metadata: 
 name: mysql
 namespace: roboshop
 labels: 
  project : roboshop
  component: mysql 
  tire: db 
spec: 
 selector: 
  project : roboshop
  component: mysql 
  tire: db 
 ports:
  - protocol: TCP
    port: 3306
    targetPort: 3306
