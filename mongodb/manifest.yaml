apiversion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project : roboshop
    component: mongodb 
    tire: db
spec:
  replicas: 1
  selector:
  matchLabels:
    project : roboshop
    component: mongodb 
    tire: db
  template:
   metadata:
    labels:
      project : roboshop
      component: mongodb
      tire: db
   spec:  
    containers:
      - name : mongodb
        image: taruntejamb/mongodb:1.0.0


---
apiVersion: v1
kind: Service
metadata:
 name : mongodb
 namespace: roboshop
 labels:
    project : roboshop
    component: mongodb 
    tire: db
spec:
 selector: 
   project : roboshop
   component: mongodb 
   tire: db
 ports:
   protocol: TCP
   port: 27017
   targetport: 27017


        