apiVersion: apps/v1 
kind: Deployment
metadata:
 name: redis 
 namespace: roboshop 
 labels: 
  project : roboshop
  component: redis 
  tire: db
spec: 
 replicas: 1
 selector:
  matchLabels:
   project : roboshop
   component: redis 
   tire: db
 template: 
   metadata:
    labels: 
      project : roboshop
      component: redis
      tire: db
   spec:  
    containers:
     - name : redis 
       image: redis:7.0

---
apiVersion: v1
kind: Service
metadata:
 name : redis
 namespace: roboshop
 labels: 
  project : roboshop
  component: redis
  tire: db 
spec:
 selector: 
   project : roboshop
   component: redis 
   tire: db 
 ports: 
  - protocol: TCP
    port: 6379
    targetPort: 6379
